# Lavapipe-based Vulkan test services for future-core.
#
# Three services share a single image (built from
# docker/Dockerfile.vulkan):
#
#   - vulkan-test         fast PR gate: vet + lint + Vulkan unit tests
#   - vulkan-conformance  regenerates/validates lavapipe golden images
#   - vulkan-parity       headless demo-app capture against lavapipe,
#                         bind-mounting the workspace so the future
#                         binary can be built + run inside the
#                         container. Output PNG lands at
#                         /output/capture.png on the container side
#                         and at $LAVAPIPE_OUTPUT (default
#                         /tmp/lavapipe-output) on the host.
#
# Docker Desktop on macOS can't forward the GPU into Linux containers, so
# the image uses Mesa's lavapipe (CPU-only Vulkan ICD) plus the Khronos
# validation layers. That means lavapipe is strict where the Mac's
# MoltenVK dev loop is permissive — API misuse that MoltenVK silently
# accepts surfaces here instead.
#
# Local usage:
#     make docker-vulkan-build
#     make docker-vulkan-test
#     make docker-vulkan-conformance
#     # demo-app capture is invoked via the host wrapper, not directly:
#     #   future-meta/scripts/capture.sh --backend lavapipe --scene <name>
#     #   future-meta/scripts/parity-diff.sh --test lavapipe --scene <name>

services:
  vulkan-test:
    build:
      context: .
      dockerfile: docker/Dockerfile.vulkan
    image: future-vulkan:latest
    volumes:
      - ./:/workspace/future-core:delegated
      - go-cache:/root/.cache/go-build
      - go-mod-cache:/root/go/pkg/mod
    working_dir: /workspace/future-core
    environment:
      # Validation layer on (baked into the image; repeated here so
      # `docker compose run` overrides are obvious). We deliberately do
      # not set VK_ICD_FILENAMES: the filename is arch-specific
      # (lvp_icd.x86_64.json on amd64 vs lvp_icd.aarch64.json on arm64).
      # The Vulkan loader auto-discovers whatever's in
      # /usr/share/vulkan/icd.d/ instead.
      VK_INSTANCE_LAYERS: VK_LAYER_KHRONOS_validation
      # Tells TestLavapipeDetection to run and assert
      # PhysicalDeviceProperties.DeviceName contains "llvmpipe".
      FUTURE_CORE_EXPECT_LAVAPIPE: "1"
      # Keep lavapipe goldens isolated from the MoltenVK-generated
      # testdata/golden/ tree the Mac dev loop writes to. See
      # conformance.GoldenDir() for the helper. MUST be absolute — go
      # test uses the package directory as the working directory, so a
      # relative path would resolve differently per package.
      FUTURE_CORE_GOLDEN_DIR: /workspace/future-core/internal/backend/vulkan/testdata/golden/lavapipe
    # Runs every Vulkan test that doesn't trip the pre-existing draw-path
    # crash under lavapipe + Khronos validation layers. That's:
    #   - TestLavapipeDetection: proves the loader picked up lavapipe
    #   - TestConformanceVulkan/(clear_red|clear_green): no draws, only
    #     render-pass LoadOp=Clear; these exercise the RT-creation +
    #     clear + readback path, which is a meaningful correctness
    #     signal even without draws.
    #   - Non-rendering unit tests that don't touch the crashing code
    #
    # Any scene that issues DrawIndexed under validation layers
    # currently SIGSEGVs inside cgo (missing sType fields on some
    # barriers + missing layout transitions). Those are pre-existing
    # bugs that MoltenVK tolerates, tracked as follow-up work.
    # When they land, expand this `-run` pattern to pick up the full
    # TestConformanceVulkan suite.
    #
    # Why not TestConformanceSoft: it's already covered by the
    # Linux/soft CI job and its goldens are the canonical source.
    # Running it here would overwrite FUTURE_CORE_GOLDEN_DIR
    # (scoped to the lavapipe subdir) with soft-rendered images,
    # poisoning subsequent TestConformanceVulkan runs.
    command: ["bash", "-c", "go test -v -count=1 -run 'TestLavapipeDetection|TestConformanceVulkan$/^(clear_red|clear_green)$' ./internal/backend/vulkan/..."]

  vulkan-conformance:
    extends:
      service: vulkan-test
    # Escape-hatch service for local debugging: runs everything with
    # `-v -count=1` so validation-layer messages and per-test output
    # are visible. Expected to FAIL on main until the backlog above
    # is fixed; useful when iterating on individual fixes.
    command: ["bash", "-c", "go test -count=1 -v ./internal/backend/conformance/... ./internal/backend/vulkan/..."]

  # Headless demo-app capture against lavapipe + Khronos validation
  # layers. Bind-mounts the entire workspace (future, future-core,
  # parity-tests, go.work) so go.work resolves future-core to the
  # local checkout — uncommitted engine changes are exercised
  # immediately without an intermediate vendor step.
  #
  # The companion host wrappers
  # (future-meta/scripts/capture-lavapipe.sh,
  # future-meta/scripts/parity-diff.sh --test lavapipe) drive this
  # service; they pass FUTURE_SCENE / FUTURE_CORE_HEADLESS /
  # FUTURE_WINDOW_* / FUTURE_SEED via `docker compose run -e`, then
  # read the captured PNG from the host side of the /output
  # bind-mount.
  vulkan-parity:
    build:
      context: .
      dockerfile: docker/Dockerfile.vulkan
    image: future-vulkan:latest
    volumes:
      # Whole workspace, not just future-core, so go.work resolves
      # future-core against the local repo and the future binary's
      # cmd/driver assets are reachable. `..` here is the workspace
      # root that owns this future-core/ directory plus its sibling
      # repos.
      - ../:/workspace/meta:delegated
      - go-cache:/root/.cache/go-build
      - go-mod-cache:/root/go/pkg/mod
      # Persistent binary cache. /tmp doesn't survive `docker compose
      # run --rm`, so without this every capture rebuilds the future
      # binary (~10-20s on warm caches). With the cache, only the
      # first capture in a sweep pays the build cost; subsequent
      # captures reuse the binary directly.
      - parity-bin-cache:/cached-bin:delegated
      # Output directory bind-mount. Defaults to /tmp/lavapipe-output
      # on the host; the host wrapper creates it before invoking
      # `docker compose run`.
      - ${LAVAPIPE_OUTPUT:-/tmp/lavapipe-output}:/output:delegated
    working_dir: /workspace/meta
    environment:
      VK_INSTANCE_LAYERS: VK_LAYER_KHRONOS_validation
      # Defaults for the env vars the script reads. The host wrapper
      # overrides these per invocation via `docker compose run -e`.
      FUTURE_SCENE: ${FUTURE_SCENE:-scene-selector}
      FUTURE_CORE_HEADLESS: ${FUTURE_CORE_HEADLESS:-60}
      FUTURE_WINDOW_WIDTH: ${FUTURE_WINDOW_WIDTH:-1920}
      FUTURE_WINDOW_HEIGHT: ${FUTURE_WINDOW_HEIGHT:-1080}
      FUTURE_CORE_HEADLESS_OUTPUT: /output/capture.png
    command: ["bash", "/workspace/meta/future-core/docker/parity-capture.sh"]

volumes:
  # Named volumes persist Go build + module caches across `docker compose
  # run` invocations. Nuking them via `docker compose down -v` triggers a
  # full recompile on the next run.
  go-cache:
  go-mod-cache:
  # Binary cache for the vulkan-parity service. Holds the most-
  # recently-built future binary so back-to-back captures (parity
  # sweeps) don't rebuild on every scene.
  parity-bin-cache:
