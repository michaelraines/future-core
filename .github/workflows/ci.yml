name: CI

on:
  push:

permissions:
  contents: read

jobs:
  # Primary CI job: lint, test, coverage, build on Linux
  ci:
    name: Lint, Test, Build (Linux)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ["1.24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglfw3-dev

      - name: Install Rust toolchain (for naga WGSL validator)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-naga-${{ runner.os }}

      - name: Install naga-cli
        run: |
          if ! command -v naga &> /dev/null; then
            cargo install naga-cli
          fi

      - name: Check formatting
        run: make fmt

      - name: Vet
        run: make TAGS=soft vet

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5.0
          install-only: true

      - name: Lint
        run: make TAGS=soft lint

      - name: Test
        run: make TAGS=soft test

      - name: Coverage check (80% minimum)
        run: make TAGS=soft cover-check

      - name: Test (race detector)
        run: make TAGS=soft test-race

      - name: Build
        run: make TAGS=soft build

  # Cross-platform build and test on macOS and Windows
  cross-platform:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        go-version: ["1.24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install Rust toolchain (for naga WGSL validator)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-naga-${{ runner.os }}

      - name: Install naga-cli
        shell: bash
        run: |
          if ! command -v naga &> /dev/null; then
            cargo install naga-cli
          fi

      - name: Test
        run: make TAGS=soft test

      - name: Build
        run: make TAGS=soft build

  # NOTE: a dedicated DX12 (WARP) — Windows job will land in a follow-up
  # PR once `internal/d3d12/d3d12.go` is ported to use Windows-compatible
  # dynamic-loading APIs. The current bindings use purego's Linux/macOS
  # entry points (`Dlopen`, `Dlsym`, `RTLD_LAZY`), which don't exist on
  # Windows — adding the CI job now would surface a 30-second build
  # failure that gates all PRs without exercising any real coverage.
  # The Docker / vkd3d-proton local dev loop (this PR) lets the Windows
  # ABI port land first; once that's compiling, the WARP CI job is a
  # straightforward drop-in.
