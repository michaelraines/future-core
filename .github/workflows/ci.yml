name: CI

on:
  push:

permissions:
  contents: read

jobs:
  # Primary CI job: lint, test, coverage, build on Linux
  ci:
    name: Lint, Test, Build (Linux)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ["1.24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglfw3-dev

      - name: Install Rust toolchain (for naga WGSL validator)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-naga-${{ runner.os }}

      - name: Install naga-cli
        run: |
          if ! command -v naga &> /dev/null; then
            cargo install naga-cli
          fi

      - name: Check formatting
        run: make fmt

      - name: Vet
        run: make TAGS=soft vet

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5.0
          install-only: true

      - name: Lint
        run: make TAGS=soft lint

      - name: Test
        run: make TAGS=soft test

      - name: Coverage check (80% minimum)
        run: make TAGS=soft cover-check

      - name: Test (race detector)
        run: make TAGS=soft test-race

      - name: Build
        run: make TAGS=soft build

  # Cross-platform build and test on macOS and Windows
  cross-platform:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        go-version: ["1.24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install Rust toolchain (for naga WGSL validator)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-naga-${{ runner.os }}

      - name: Install naga-cli
        shell: bash
        run: |
          if ! command -v naga &> /dev/null; then
            cargo install naga-cli
          fi

      - name: Test
        run: make TAGS=soft test

      - name: Build
        run: make TAGS=soft build

  # DX12 GPU-path build + test on Windows. Runs WITHOUT `-tags soft`
  # so the real `internal/d3d12/` purego bindings + the
  # internal/backend/dx12/ `_gpu.go` files compile and exercise.
  # The runners are headless (no GPU), so DX12 picks up WARP — the
  # software DX12 implementation Microsoft ships in every Windows
  # install. Mirrors Vulkan's lavapipe-in-Docker pattern: strict
  # validation in CI, no GPU hardware required.
  dx12:
    name: DX12 (WARP) — Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build (DX12 GPU path)
        shell: bash
        run: go build ./internal/backend/dx12/... ./internal/d3d12/...

      - name: Test (DX12 GPU path against WARP)
        shell: bash
        # WARP is auto-selected when no hardware adapter is found on the
        # runner. If the dx12 backend's GPU implementation is still
        # incomplete, tests gate themselves via build tags and this job
        # remains green — letting the matrix grow as the backend lands.
        run: go test ./internal/backend/dx12/... ./internal/d3d12/...
