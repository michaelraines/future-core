name: CI

on:
  push:

permissions:
  contents: read

jobs:
  # Primary CI job: lint, test, coverage, build on Linux
  ci:
    name: Lint, Test, Build (Linux)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ["1.24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglfw3-dev

      - name: Install Rust toolchain (for naga WGSL validator)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-naga-${{ runner.os }}

      - name: Install naga-cli
        run: |
          if ! command -v naga &> /dev/null; then
            cargo install naga-cli
          fi

      - name: Check formatting
        run: make fmt

      - name: Vet
        run: make TAGS=soft vet

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5.0
          install-only: true

      - name: Lint
        run: make TAGS=soft lint

      - name: Test
        run: make TAGS=soft test

      - name: Coverage check (80% minimum)
        run: make TAGS=soft cover-check

      - name: Test (race detector)
        run: make TAGS=soft test-race

      - name: Build
        run: make TAGS=soft build

  # Cross-platform build and test on macOS and Windows
  cross-platform:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        go-version: ["1.24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install Rust toolchain (for naga WGSL validator)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-naga-${{ runner.os }}

      - name: Install naga-cli
        shell: bash
        run: |
          if ! command -v naga &> /dev/null; then
            cargo install naga-cli
          fi

      - name: Test
        run: make TAGS=soft test

      - name: Build
        run: make TAGS=soft build

  # DX12 GPU-path build verification on Windows. Runs WITHOUT
  # `-tags soft`, so the real `internal/d3d12/` bindings + the
  # `internal/backend/dx12/` `_gpu.go` files compile end-to-end —
  # the only Windows compilation path that exercises them. The
  # runtime path is still incomplete; conformance tests will land
  # incrementally and run against WARP (Microsoft's software DX12
  # implementation, included on every Windows install — no GPU
  # required on the runner). Mirrors Vulkan's lavapipe-in-Docker
  # pattern: strict build verification in CI, no GPU hardware.
  dx12:
    name: DX12 (WARP) — Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build (DX12 GPU path)
        shell: bash
        run: go build ./internal/backend/dx12/... ./internal/d3d12/...

      # Test step deliberately omitted until the dx12 backend's
      # runtime path is at parity with the other GPU backends. Adding
      # it back is a one-line change once conformance scenes pass on
      # WARP.
